[bot]
token = "TELEGRAM_BOT_TOKEN"
drop_pending_updates = true

[codex]
command = "codex"
args = ["app-server"]

[users]
allowed_ids = []

[approval]
mode = "interactive"
auto_response = "approve"

[logging]
level = "DEBUG"

[forwarding]
app_server_event_level = "INFO"
app_server_event_allowlist = []
app_server_event_denylist = []

[display]
max_message_length = 4000
send_progress = true
