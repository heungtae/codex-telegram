[bot]
token = "TELEGRAM_BOT_TOKEN"

[codex]
command = "codex"
args = ["app-server"]

[users]
allowed_ids = []

[approval]
require_for = ["file_write", "command_exec", "tool_use"]
auto_approve_trusted = false

[logging]
level = "DEBUG"

[forwarding]
app_server_event_level = "INFO"
app_server_event_allowlist = []
app_server_event_denylist = []

[display]
max_message_length = 4000
send_progress = true
